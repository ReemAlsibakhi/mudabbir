name: mudabbir
description: مدبّر — تطبيق إدارة المصروف العائلي العربي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  go_router: ^13.2.0
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.3
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5
  fl_chart: ^0.68.0
  share_plus: ^9.0.0
  pdf: ^3.10.8
  printing: ^5.13.1
  http: ^1.2.1
  hijri: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
