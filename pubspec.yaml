name: mudabbir
description: مدبّر — تطبيق إدارة المصروف العائلي العربي
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Local Database ────────────────────────────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── Navigation ────────────────────────────────────────
  go_router: ^13.2.0

  # ── Notifications ─────────────────────────────────────
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # ── Utilities ─────────────────────────────────────────
  equatable: ^2.0.5
  uuid: ^4.4.0
  intl: ^0.19.0

  # ── Icons ─────────────────────────────────────────────
  cupertino_icons: ^1.0.6

  # ══════════════════════════════════════════════════════
  # PHASE 2
  # ══════════════════════════════════════════════════════

  # File system access
  path_provider: ^2.1.4

  # AI Chat (Claude API)
  http: ^1.2.0

  # GPS / Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # PDF Export
  pdf: ^3.11.0
  printing: ^5.13.0

  # Share
  share_plus: ^10.0.0

  # Image (OCR receipts)
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  generate: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
