name: mudabbir
description: مدبّر — تطبيق إدارة المصروف العائلي العربي
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# ══════════════════════════════════════════════════════════
# DEPENDENCIES
# ══════════════════════════════════════════════════════════
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  equatable:        ^2.0.5

  # Local database
  hive_flutter:     ^1.1.0
  hive:             ^2.2.3

  # Navigation
  go_router:        ^13.2.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone:         ^0.9.4

  # Utilities
  uuid:             ^4.4.0
  intl:             ^0.19.0
  cupertino_icons:  ^1.0.6

  # Phase 2: AI Chat
  http:             ^1.2.0

  # Phase 2: GPS
  geolocator:       ^12.0.0
  geocoding:        ^3.0.0

  # Phase 2: File system
  path_provider:    ^2.1.4
  share_plus:       ^10.0.0

  # Phase 2: Camera / OCR (optional)
  image_picker:     ^1.1.0

# ══════════════════════════════════════════════════════════
# DEV DEPENDENCIES
# ══════════════════════════════════════════════════════════
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^3.0.0
  hive_generator:         ^2.0.1
  build_runner:           ^2.4.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash:  ^2.4.1

# ══════════════════════════════════════════════════════════
# FLUTTER CONFIG
# ══════════════════════════════════════════════════════════
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900

# ══════════════════════════════════════════════════════════
# LAUNCHER ICONS CONFIG
# Run: dart run flutter_launcher_icons
# ══════════════════════════════════════════════════════════
flutter_launcher_icons:
  android:            true
  ios:                false
  image_path:         "assets/icons/app_icon.png"
  min_sdk_android:    21
  adaptive_icon_background: "#050A14"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# ══════════════════════════════════════════════════════════
# SPLASH SCREEN CONFIG
# Run: dart run flutter_native_splash:create
# ══════════════════════════════════════════════════════════
flutter_native_splash:
  color:            "#050A14"
  android:          true
  ios:              false
  android_12:
    color:          "#050A14"
  fullscreen:       true
