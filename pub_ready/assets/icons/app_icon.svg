<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2744"/>
      <stop offset="100%" style="stop-color:#061628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#06D6A0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="512" cy="420" r="280" fill="rgba(37,99,235,0.08)"/>
  <!-- Arabic م letter stylised -->
  <text x="512" y="600"
        font-family="Arial, sans-serif"
        font-size="520"
        font-weight="900"
        text-anchor="middle"
        fill="url(#accent)">م</text>
  <!-- Bottom green line accent -->
  <rect x="312" y="720" width="400" height="16" rx="8" fill="url(#green)"/>
  <!-- Dots pattern -->
  <circle cx="820" cy="240" r="18" fill="rgba(14,165,233,0.3)"/>
  <circle cx="780" cy="290" r="10" fill="rgba(14,165,233,0.2)"/>
  <circle cx="200" cy="780" r="14" fill="rgba(6,214,160,0.25)"/>
</svg>
